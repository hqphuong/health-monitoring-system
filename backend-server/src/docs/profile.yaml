tags:
  - name: Profile
    description: Các API quản lý hồ sơ sức khỏe

paths:
  /profile:
    get:
      summary: Lấy thông tin hồ sơ sức khỏe của người dùng
      tags: [Profile]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Lấy thông tin hồ sơ thành công
    patch:
      summary: Cập nhật thông tin hồ sơ sức khỏe của người dùng
      tags: [Profile]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                full_name: # Thêm họ tên
                  type: string
                  example: "Nguyễn Văn A"
                height:
                  type: number # Đổi sang number cho linh hoạt
                  format: float
                  example: 170.5
                  nullable: true
                weight:
                  type: number
                  format: float
                  example: 65.0
                  nullable: true
                gender: # ĐỔI Ở ĐÂY: Từ boolean sang string
                  type: string
                  example: "female"
                  enum: [male, female, other]
                  nullable: true
                birth:
                  type: string
                  format: date
                  example: "2000-01-01"
                  nullable: true
                phone_number: # Thêm số điện thoại
                  type: string
                  example: "0123456789"
                blood_type: # Thêm nhóm máu
                  type: string
                  example: "O+"
                systolic_bp:
                  type: integer
                  nullable: true
                diastolic_bp:
                  type: integer
                  nullable: true
      responses:
        200:
          description: Cập nhật hồ sơ sức khỏe thành công
        400:
          description: Dữ liệu đầu vào không hợp lệ
        401:
          description: Không tìm thấy thông tin xác thực người dùng